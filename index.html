<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Ironflow Studios — Premium websites, dashboards and automation for modern businesses."
    />
    <title>Ironflow Studios — Digital Studio</title>
    <script>
      ;(function () {
        var stored =
          localStorage.getItem('ironflow-theme') || localStorage.getItem('techies-theme')
        var theme = stored === 'dark' ? 'dark' : 'light'
        document.documentElement.dataset.theme = theme
        document.documentElement.style.colorScheme = theme
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
